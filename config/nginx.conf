events
{
    worker_connections 1024;
}

http
{
    upstream aas_backend 
    {
        server machine1-aas:8081;
        server machine2-aas:8081;
    }

    # Dynamic CORS Origin Mapping for Authenticated Cross-Origin Requests
    map $http_origin $cors_origin {
        default "$http_origin";
        "" "http://$host";
    }

    # Combined HTTP (80 & 8080) Server - Gateway for UI, Authentication & AAS API
    server
    {
        listen 80;
        listen 8080;
        server_name _;
        client_max_body_size 100M;

        # Flask Web Dashboard Product Explorer
        location /dashboard {
            proxy_pass http://172.17.0.1:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/fetch-partner-data {
            proxy_pass http://172.17.0.1:5000/api/fetch-partner-data;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Keycloak Authentication Redirect for Root
        location = / 
        {
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        location = /index.html 
        {
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        # BaSyx Web UI Editor
        location /aaseditor 
        {
            if ($args != "") {
                proxy_pass http://aas-web-ui:3000;
                break;
            }
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        # BaSyx AAS Backend REST API Endpoints (with Full Dynamic CORS & Credential Support)
        location ~ ^/(description|shells|submodels|concept-descriptions|upload) 
        {
            # Strip duplicate CORS headers from upstream Java/Spring backends
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Expose-Headers';

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Authorization' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://aas_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default Fallback for Static Assets (js, css, images, etc.)
        location / 
        {
            proxy_pass http://aas-web-ui:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS (443) Server
    server
    {
        listen 443 ssl;
        server_name _;
        client_max_body_size 100M;

        ssl_certificate     /etc/nginx/certs/certificate.crt;
        ssl_certificate_key /etc/nginx/certs/private.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / 
        {
            proxy_pass http://aas_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTP (3000) Gateway Server
    server
    {
        listen 3000;
        server_name _;

        location = / 
        {
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        location = /index.html 
        {
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        location = /aaseditor 
        {
            if ($args != "") {
                proxy_pass http://aas-web-ui:3000;
                break;
            }
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        location / 
        {
            proxy_pass http://aas-web-ui:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}