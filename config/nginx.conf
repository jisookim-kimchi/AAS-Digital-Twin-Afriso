events
{
    worker_connections 1024;
}

http
{
    upstream aas_backend 
    {
        server machine1-aas:8081;
        server machine2-aas:8081;
    }

    # HTTP (80) Server
    server
    {
        listen 80;
        server_name localhost;
        client_max_body_size 100M;

        location / 
        {
            # =========================================================
            # IP Whitelist Security Rule (Customer IP Control via .env)
            # =========================================================
            # allow 127.0.0.1;               # Localhost access allowed
            # allow 172.16.0.0/12;           # Internal Docker subnet allowed
            # allow ${CUSTOMER_ALLOWED_IP};  # Customer IP (Loaded from .env: 211.100.50.20)
            # deny all;                      # Block unauthorized external IPs
            # =========================================================

            proxy_pass http://aas_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OAuth2 Keycloak SSO Login Redirect
        location /login {
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/;
        }
    }

    # HTTPS (443) Server
    server
    {
        listen 443 ssl;
        server_name localhost;
        client_max_body_size 100M;

        ssl_certificate     /etc/nginx/certs/certificate.crt;
        ssl_certificate_key /etc/nginx/certs/private.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / 
        {
            # =========================================================
            # IP Whitelist Security Rule (Customer IP Control via .env)
            # =========================================================
            # allow 127.0.0.1;               # Localhost access allowed
            # allow 172.16.0.0/12;           # Internal Docker subnet allowed
            # allow ${CUSTOMER_ALLOWED_IP};  # Customer IP (Loaded from .env: 211.100.50.20)
            # deny all;                      # Block unauthorized external IPs
            # =========================================================

            proxy_pass http://aas_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTP (3000) Gateway Server (Force Keycloak Login First!)
    server
    {
        listen 3000;
        server_name localhost;

        location = / 
        {
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        location = /index.html 
        {
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        location = /aaseditor 
        {
            if ($args != "") {
                proxy_pass http://aas-web-ui:3000;
                break;
            }
            return 302 http://$host:9999/realms/basyx/protocol/openid-connect/auth?client_id=basyx-client&response_type=code&redirect_uri=http://$http_host/aaseditor;
        }

        location / 
        {
            proxy_pass http://aas-web-ui:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
