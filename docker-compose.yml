services:
 
  mongo:
    container_name: mongo
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/mongodb:/data/db
    networks: 
      - backend
    healthcheck:
      test:
        ["CMD", "mongosh", "--username", "mongoAdmin", "--password", "mongoPassword", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  #machine 1 server 
  machine1-aas:
    container_name: machine1-aas
    image:  eclipsebasyx/aas-environment:2.0.0-milestone-05
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      BASYX_CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
      SPRING_MONGODB_URI: "mongodb://${DB_USER}:${DB_PASSWORD}@mongo:27017/machine1?authSource=admin"
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION: "http://aas-registry:8080"
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION: "http://submodel-registry:8080"
      BASYX_EXTERNALURL: "http://${SERVER_IP:-localhost}:8081"
      BASYX_FEATURE_AASREGISTRYINTEGRATION: "true"
      BASYX_FEATURE_SUBMODELREGISTRYINTEGRATION: "true"
      BASYX_FEATURE_SECURITY_ENABLED: "true" 
      BASYX_FEATURE_SECURITY_RBAC_ENABLED: "true"
      BASYX_FEATURE_SECURITY_RBAC_POLICY: "/opt/basyx/basyx-rbac.json"
      SPRING_PROFILES_ACTIVE: "jwt"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://${SERVER_IP:-localhost}:9999/realms/basyx"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:8080/realms/basyx/protocol/openid-connect/certs"
    volumes:
      - ./config/basyx-rbac.json:/opt/basyx/basyx-rbac.json:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks: 
      - backend
      - frontend

  #machine 2 server 
  machine2-aas:
    container_name: machine2-aas
    image: eclipsebasyx/aas-environment:2.0.0-milestone-05
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      BASYX_CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
      SPRING_MONGODB_URI: "mongodb://${DB_USER}:${DB_PASSWORD}@mongo:27017/machine2?authSource=admin"
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION: "http://aas-registry:8080"
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION: "http://submodel-registry:8080"
      BASYX_EXTERNALURL: "http://${SERVER_IP:-localhost}:8082"
      BASYX_FEATURE_AASREGISTRYINTEGRATION: "true"
      BASYX_FEATURE_SUBMODELREGISTRYINTEGRATION: "true"
      BASYX_FEATURE_SECURITY_ENABLED: "true"
      BASYX_FEATURE_SECURITY_RBAC_ENABLED: "true"
      BASYX_FEATURE_SECURITY_RBAC_POLICY: "/opt/basyx/basyx-rbac.json"
      SPRING_PROFILES_ACTIVE: "jwt"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://${SERVER_IP:-localhost}:9999/realms/basyx"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:8080/realms/basyx/protocol/openid-connect/certs"
    volumes:
      - ./config/basyx-rbac.json:/opt/basyx/basyx-rbac.json:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend
      - frontend
  
  aas-ui:
    container_name: aas-web-ui
    image: eclipsebasyx/aas-gui:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      ENDPOINT_CONFIG_AVAILABLE: "true"
      ALLOW_EDITING: "true"
      ALLOW_UPLOADING: "true"
      ALLOW_LOGOUT: "true"
      AAS_DISCOVERY_PATH: "http://${SERVER_IP:-localhost}:8084"
      AAS_REGISTRY_PATH: "http://${SERVER_IP:-localhost}:8083"
      SUBMODEL_REGISTRY_PATH: "http://${SERVER_IP:-localhost}:8084"
      AAS_REPO_PATH: "http://${SERVER_IP:-localhost}"
      SUBMODEL_REPO_PATH: "http://${SERVER_IP:-localhost}"
      CD_REPO_PATH: "http://${SERVER_IP:-localhost}"
      SM_VIEWER_EDITOR: "true"
      START_PAGE_ROUTE_NAME: AASEditor
      AUTH_ENABLED: "true"
      KEYCLOAK_URL: "http://${SERVER_IP:-localhost}:9999"
      KEYCLOAK_REALM: "basyx"
      KEYCLOAK_CLIENT_ID: "basyx-client"
    volumes:
      - ./config/basyx-infra.yml:/basyx-infra.yml:ro
    depends_on:
      machine1-aas:
        condition: service_started
      machine2-aas:
        condition: service_started
    networks: 
      - frontend
  
  aas-registry:
    container_name: aas-registry
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-milestone-13
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_MONGODB_URI: "mongodb://${DB_USER}:${DB_PASSWORD}@mongo:27017/aasregistry?authSource=admin"
      SPRING_MONGODB_HOST: mongo
      SPRING_MONGODB_PORT: 27017
      SPRING_MONGODB_DATABASE: aasregistry
      SPRING_MONGODB_USERNAME: ${DB_USER}
      SPRING_MONGODB_PASSWORD: ${DB_PASSWORD}
      SPRING_MONGODB_AUTHENTICATION_DATABASE: admin
      BASYX_CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
    depends_on:
      mongo:
        condition: service_healthy
    networks: 
      - backend
      - frontend

  submodel-registry:
    container_name: submodel-registry
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-SNAPSHOT
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_MONGODB_URI: "mongodb://${DB_USER}:${DB_PASSWORD}@mongo:27017/smregistry?authSource=admin"
      SPRING_MONGODB_HOST: mongo
      SPRING_MONGODB_PORT: 27017
      SPRING_MONGODB_DATABASE: smregistry
      SPRING_MONGODB_USERNAME: ${DB_USER}
      SPRING_MONGODB_PASSWORD: ${DB_PASSWORD}
      SPRING_MONGODB_AUTHENTICATION_DATABASE: admin
      BASYX_CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
    depends_on:
      mongo:
        condition: service_healthy
    networks: 
      - backend
      - frontend

  nginx:
    image: nginx:latest
    container_name: nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - machine1-aas
      - machine2-aas
    networks: 
      - frontend
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    ports:
      - "9999:8080"
    volumes:
      - ./config/basyx-realm.json:/opt/keycloak/data/import/basyx-realm.json:ro
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_TEST_USER_PASSWORD: ${KEYCLOAK_TEST_USER_PASSWORD}
      KEYCLOAK_TEST_ADMIN_PASSWORD: ${KEYCLOAK_TEST_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloack-postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - keycloack-postgres
    networks: 
      - frontend
      - backend

  keycloack-postgres:
    image: postgres:16
    container_name: keycloack-postgres
    restart: unless-stopped
    environment: 
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/keycloack-postgres:/var/lib/postgresql/data
    networks: 
      - backend 

networks:
  backend:
  frontend:
